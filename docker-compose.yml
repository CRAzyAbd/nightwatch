# NIGHTWATCH — Docker Compose
# Three services:
#   nginx   — public-facing reverse proxy (port 80)
#   waf     — NIGHTWATCH WAF + API (internal port 8000)
#   target  — vulnerable target app (internal port 5001)

version: "3.9"

services:

  # ── Nginx (public entry point) ──────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: nightwatch_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - waf
    restart: unless-stopped
    networks:
      - nightwatch_net
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── NIGHTWATCH WAF ───────────────────────────────────────────────
  waf:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nightwatch_waf
    expose:
      - "8000"
    environment:
      TARGET_URL:              http://target:5001
      WAF_HOST:                0.0.0.0
      WAF_PORT:                8000
      API_SECRET_KEY:          ${API_SECRET_KEY:-nightwatch-change-this}
      ABUSEIPDB_API_KEY:       ${ABUSEIPDB_API_KEY:-}
      ABUSEIPDB_ENABLED:       ${ABUSEIPDB_ENABLED:-false}
      ABUSEIPDB_BLOCK_THRESHOLD: ${ABUSEIPDB_BLOCK_THRESHOLD:-50}
      RATE_LIMIT_REQUESTS:     ${RATE_LIMIT_REQUESTS:-30}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      RATE_LIMIT_BLOCK_TTL_MINUTES: ${RATE_LIMIT_BLOCK_TTL_MINUTES:-60}
      LOG_LEVEL:               ${LOG_LEVEL:-INFO}
    volumes:
      # Persist SQLite DB between container restarts
      - nightwatch_db:/app/nightwatch.db
      # Persist trained ML models
      - nightwatch_models:/app/ml/saved_models
    depends_on:
      - target
    restart: unless-stopped
    networks:
      - nightwatch_net
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Vulnerable Target App ────────────────────────────────────────
  target:
    build:
      context: .
      dockerfile: Dockerfile.target
    container_name: nightwatch_target
    expose:
      - "5001"
    restart: unless-stopped
    networks:
      - nightwatch_net
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/')"]
      interval: 30s
      timeout: 5s
      retries: 3

# ── Networks ─────────────────────────────────────────────────────────
networks:
  nightwatch_net:
    driver: bridge

# ── Volumes ──────────────────────────────────────────────────────────
volumes:
  nightwatch_db:      # persists SQLite database
  nightwatch_models:  # persists trained ML models

