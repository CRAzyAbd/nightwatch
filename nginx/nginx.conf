# NIGHTWATCH — Nginx Configuration
# Nginx sits in front of Gunicorn and handles:
#   - Connection rate limiting (network level, before WAF even runs)
#   - Request buffering
#   - Security headers
#   - Static file serving (dashboard)
#   - Upstream proxy to Gunicorn

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types         text/plain application/json application/javascript text/css;

    # ── Network-level rate limiting ───────────────────────────────
    # This is a second layer on top of NIGHTWATCH's own rate limiter.
    # 10 requests/second per IP, burst of 20
    limit_req_zone $binary_remote_addr zone=waf_limit:10m rate=10r/s;

    # ── Connection limiting ───────────────────────────────────────
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Upstream: Gunicorn ────────────────────────────────────────
    upstream nightwatch_waf {
        server waf:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # ── Security headers (added to every response) ────────────
        add_header X-Frame-Options           "DENY"                    always;
        add_header X-Content-Type-Options    "nosniff"                 always;
        add_header X-XSS-Protection          "1; mode=block"           always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), camera=()" always;

        # ── Hide server info ──────────────────────────────────────
        server_tokens off;

        # ── Max request size (blocks huge payload attacks) ────────
        client_max_body_size 10m;

        # ── Rate limiting ─────────────────────────────────────────
        limit_req zone=waf_limit burst=20 nodelay;
        limit_conn conn_limit 20;

        # ── Block common scanner paths immediately ────────────────
        location ~* \.(git|env|bak|sql|conf|cfg)$ {
            return 403;
        }

        # ── Block common attack paths ─────────────────────────────
        location ~* (wp-admin|wp-login|xmlrpc|phpmyadmin|\.php$) {
            return 403;
        }

        # ── Dashboard static files (served directly by Nginx) ─────
        location /dashboard/ {
            proxy_pass http://nightwatch_waf;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ── All other traffic → NIGHTWATCH WAF ───────────────────
        location / {
            proxy_pass         http://nightwatch_waf;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";

            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;

            proxy_buffer_size          16k;
            proxy_buffers              4 32k;
            proxy_busy_buffers_size    64k;
        }

        # ── Health check endpoint (bypasses rate limiting) ────────
        location = /api/health {
            proxy_pass http://nightwatch_waf;
            proxy_set_header Host $host;
        }

        # ── Custom error pages ────────────────────────────────────
        error_page 429 /429.json;
        location = /429.json {
            default_type application/json;
            return 429 '{"blocked":true,"message":"Too many requests — rate limited by Nginx","status":429}';
        }

        error_page 502 503 /50x.json;
        location = /50x.json {
            default_type application/json;
            return 502 '{"error":"WAF temporarily unavailable","status":502}';
        }
    }
}
